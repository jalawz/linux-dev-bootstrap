name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shell-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Validate Bash syntax
        run: bash -n bootstrap.sh lib/common.sh adapters/*.sh modules/*.sh

      - name: Run ShellCheck
        run: shellcheck bootstrap.sh lib/common.sh adapters/*.sh modules/*.sh
